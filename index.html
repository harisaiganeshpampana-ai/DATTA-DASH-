<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINE-DASH | Premium Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased">

    <div id="launch-screen" class="fixed inset-0 z-[600] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative bg-zinc-900 rounded-full p-12 border border-white/5 animate-pulse shadow-2xl">
            <span class="text-7xl">🙏</span>
        </div>
        <p class="mt-12 text-zinc-500 font-bold tracking-[0.4em] text-[10px] uppercase italic">Welcome to Datta Dash</p>
    </div>

    <div id="restaurant-selector" class="hidden min-h-screen p-6 flex flex-col items-center">
        <h1 class="text-3xl font-black italic text-red-600 tracking-tighter mb-10 mt-8 uppercase underline decoration-zinc-800">DINE-DASH</h1>
        <div onclick="openRestaurant('tbc')" class="w-full max-w-sm bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl cursor-pointer active:scale-95 transition-transform">
            <div class="h-44 bg-red-900 flex items-center justify-center"><h2 class="text-6xl font-black italic text-white uppercase tracking-tighter shadow-2xl">TBC</h2></div>
            <div class="p-8 text-center bg-[#111]">
                <h3 class="text-xl font-bold mb-2 uppercase italic text-white">TBC Restaurant</h3>
                <p class="text-zinc-500 text-[10px] mb-6 uppercase tracking-widest italic font-bold">24H Service • Near GLA Gate No. 1</p>
                <div class="flex justify-center gap-6 text-[10px] font-black uppercase tracking-widest italic"><span class="text-green-500">Open Now</span><span class="text-red-500 font-black">Free Delivery</span></div>
            </div>
        </div>
    </div>

    <div id="menu-app" class="hidden min-h-screen">
        <header class="bg-[#1a1a1a] p-5 sticky top-0 z-50 border-b border-zinc-800 shadow-xl">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <button onclick="goHome()" class="p-2 bg-zinc-800 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                <h1 class="text-xl font-black text-red-600 italic tracking-tighter uppercase">TBC Menu</h1>
                <div class="flex gap-2">
                    <button onclick="toggleAI()" class="p-2.5 bg-zinc-800 rounded-full border border-zinc-700 shadow-lg"><svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg></button>
                    <button onclick="toggleCart()" class="bg-red-600 p-2.5 rounded-full relative shadow-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black px-1.5 rounded-full">0</span></button>
                </div>
            </div>
        </header>

        <nav class="bg-[#0f0f0f] sticky top-[73px] z-40 border-b border-zinc-800 py-3 overflow-x-auto no-scrollbar">
            <div class="flex gap-8 px-6 whitespace-nowrap text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">
                <button onclick="showSection('veg')" class="cat-btn text-red-600">Veg Specials</button>
                <button onclick="showSection('nonveg')" class="cat-btn">Non-Veg Chicken</button>
                <button onclick="showSection('fastfood')" class="cat-btn">Snacks/Chinese</button>
                <button onclick="showSection('beverages')" class="cat-btn">Drinks</button>
            </div>
        </nav>

        <main class="p-6 max-w-xl mx-auto pb-44"><div id="items-container" class="space-y-8"></div></main>
    </div>

    <div id="ai-ui" class="fixed inset-0 bg-[#0a0a0a] z-[1000] hidden flex flex-col p-8">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-6"><h2 class="text-3xl font-black italic text-red-600 uppercase">Dash Voice AI</h2><button onclick="toggleAI()" class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>
        <div id="ai-messages" class="flex-grow overflow-y-auto space-y-6 mb-6 text-sm no-scrollbar text-zinc-300">
            <div class="bg-zinc-900 p-6 rounded-3xl rounded-tl-none border border-zinc-800 italic">Welcome! I can detect your location automatically or help with the menu!</div>
        </div>
        <div class="flex gap-3 bg-zinc-900 p-2 rounded-3xl border border-zinc-800 shadow-2xl items-center">
            <input type="text" id="ai-input" placeholder="Ask about prices..." class="flex-grow bg-transparent p-4 outline-none font-bold text-sm text-white">
            <button onclick="askAI()" class="bg-red-600 px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg italic">Send</button>
        </div>
    </div>

    <div id="cart-ui" class="fixed inset-0 bg-[#0a0a0a] z-[1100] hidden flex flex-col p-8">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6"><h2 class="text-4xl font-black italic text-red-600 uppercase">My Order</h2><button onclick="toggleCart()" class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="mt-auto pt-8 border-t border-zinc-900">
            <div class="flex justify-between items-end mb-6">
                <button onclick="clearCart()" class="text-[10px] font-black text-zinc-700 uppercase tracking-widest underline">Clear Order</button>
                <span id="total" class="text-4xl font-black italic tracking-tighter text-red-600">₹0</span>
            </div>
            
            <div class="bg-zinc-900 rounded-[2rem] p-6 mb-6 border border-zinc-800 flex flex-col items-center">
                <button onclick="getLocation()" id="loc-btn" class="mb-4 bg-zinc-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase flex items-center gap-3 border border-zinc-700 active:bg-green-600 transition-colors">
                    <svg class="w-4 h-4 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"/></svg>
                    Use My Current Location
                </button>
                <input type="text" id="room" placeholder="Optional: Room Number" class="w-full bg-transparent border-none text-center text-xl font-black text-red-600 placeholder:text-zinc-800 uppercase outline-none">
                <p id="loc-status" class="text-[8px] text-zinc-500 mt-2 uppercase font-black tracking-widest"></p>
            </div>
            
            <button onclick="sendOrder()" class="w-full bg-red-600 py-6 rounded-3xl font-black text-xl uppercase italic shadow-2xl shadow-red-900/40 active:scale-95 transition-transform">Confirm Order</button>
        </div>
    </div>

    <script>
        const menuData = {
            veg: [
                { name: "Delux Thali (Full Meal)", price: 180, cat: "Thali" },
                { name: "Matar Paneer", price: 190, cat: "Paneer" },
                { name: "Paneer Tikka Butter Masala", price: 230, cat: "Paneer" },
                { name: "Dal Makhani", price: 200, cat: "Dal" },
                { name: "Veg. Biryani", price: 150, cat: "Rice" },
                { name: "Butter Naan", price: 35, cat: "Breads" }
            ],
            nonveg: [
                { name: "Butter Chicken", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Kadai Chicken", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Chicken Changezi", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Chicken Biryani", price: 220, type: "nonveg" },
                { name: "Chicken Roll", price: 120, type: "nonveg" }
            ],
            fastfood: [
                { name: "Paneer Tikka Pizza", price: 200, cat: "Pizza" },
                { name: "Farm Fresh Pizza", price: 180, cat: "Pizza" },
                { name: "Veg Chowmein", price: 100, cat: "Chinese" },
                { name: "Paneer Burger", price: 90, cat: "Burger" },
                { name: "Veg Maggi", price: 90, cat: "Maggi" }
            ],
            beverages: [{ name: "Kitkat Shake", price: 130 }, { name: "Cold Coffee", price: 100 }, { name: "Virgin Mojito", price: 100 }]
        };

        let cart = [];
        let userLocation = "";

        window.onload = () => { setTimeout(() => { document.getElementById('launch-screen').style.opacity = '0'; setTimeout(() => { document.getElementById('launch-screen').classList.add('hidden'); document.getElementById('restaurant-selector').classList.remove('hidden'); }, 1000); }, 4000); };

        function openRestaurant() { document.getElementById('restaurant-selector').classList.add('hidden'); document.getElementById('menu-app').classList.remove('hidden'); showSection('veg'); }
        function goHome() { document.getElementById('menu-app').classList.add('hidden'); document.getElementById('restaurant-selector').classList.remove('hidden'); }

        function showSection(id) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('text-red-600'));
            event.target.classList.add('text-red-600');
            const list = menuData[id];
            document.getElementById('items-container').innerHTML = list.map(i => `
                <div class="bg-zinc-900/60 p-6 rounded-[2.5rem] border border-zinc-800 shadow-xl">
                    <div class="${i.type == 'nonveg' ? 'nonveg-dot' : 'veg-dot'} mb-4"></div>
                    <h3 class="font-black text-sm uppercase italic text-white tracking-tighter mb-4">${i.name}</h3>
                    <div class="flex flex-col gap-3">
                        ${i.sizes ? Object.entries(i.sizes).map(([s, p]) => `
                            <button onclick="add('${i.name} (${s})', ${p})" class="flex-grow bg-zinc-800 border border-zinc-700 p-4 rounded-3xl text-[9px] font-black uppercase flex justify-between items-center px-8 active:bg-red-600 transition-all"><span>${s}</span><span class="text-red-500 font-black">₹${p}</span></button>`).join('') : `
                            <button onclick="add('${i.name}', ${i.price})" class="w-full bg-zinc-800 border border-zinc-700 p-5 rounded-3xl font-black text-xs uppercase flex justify-between items-center px-8 active:scale-95 italic"><span>Add Item</span><span class="text-red-500 font-black">₹${i.price}</span></button>`}
                    </div>
                </div>`).join('');
        }

        function add(n, p) { cart.push({name:n, price:p}); updateCart(); }
        function remove(idx) { cart.splice(idx, 1); updateCart(); }
        function clearCart() { cart = []; updateCart(); }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total').innerText = '₹' + cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-zinc-900/70 p-5 rounded-3xl border border-zinc-800 shadow-xl">
                    <div><p class="font-black text-[10px] uppercase text-white tracking-widest italic">${i.name}</p><p class="text-red-600 font-black italic text-sm">₹${i.price}</p></div>
                    <button onclick="remove(${idx})" class="p-2 text-zinc-700 hover:text-red-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                </div>`).join('');
        }

        function toggleCart() { document.getElementById('cart-ui').classList.toggle('hidden'); }
        function toggleAI() { document.getElementById('ai-ui').classList.toggle('hidden'); }

        // AUTOMATIC GPS ACCESS
        function getLocation() {
            const status = document.getElementById('loc-status');
            const btn = document.getElementById('loc-btn');
            status.innerText = "Accessing Location...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    userLocation = `https://www.google.com/maps?q=${lat},${lon}`;
                    status.innerText = "Location Detected! ✓";
                    btn.classList.add('bg-green-600', 'text-white');
                    btn.innerHTML = "Location Secured ✓";
                }, (err) => {
                    status.innerText = "Permission Denied. Please enter manually.";
                });
            } else { status.innerText = "GPS not supported on this browser."; }
        }

        function askAI() {
            const input = document.getElementById('ai-input').value.toLowerCase();
            const box = document.getElementById('ai-messages');
            if(!input) return;
            box.innerHTML += `<div class="bg-red-600 p-5 rounded-3xl rounded-tr-none text-right font-black text-[10px] ml-14 italic uppercase text-white shadow-lg tracking-widest">${input}</div>`;
            let reply = "Checking menu... ask about chicken portions, thalis, or delivery speed!";
            if(input.includes("chicken")) reply = "Our Chicken Curries start at ₹180. We have Butter Chicken, Kadai Chicken, and 8 others!";
            if(input.includes("delivery")) reply = "We deliver to GLA Gate No. 1 in under 20 minutes!";
            setTimeout(() => { box.innerHTML += `<div class="bg-zinc-900 p-6 rounded-3xl rounded-tl-none border border-zinc-800 mr-14 text-zinc-300 leading-relaxed italic uppercase font-bold text-[10px] tracking-widest text-red-600">AI: ${reply}</div>`; box.scrollTop = box.scrollHeight; speak(reply); }, 600);
            document.getElementById('ai-input').value = "";
        }

        function speak(t) { const msg = new SpeechSynthesisUtterance(); msg.text = t; window.speechSynthesis.speak(msg); }

        function sendOrder() {
            const room = document.getElementById('room').value || "Location Link Only";
            if(cart.length === 0) return alert("Order is empty!");
            if(!userLocation) return alert("Please click 'Use My Location' first!");
            
            const total = cart.reduce((s, i) => s + i.price, 0);
            const text = encodeURIComponent(`*DINE-DASH ORDER*\n------------------\n*Location:* ${userLocation}\n*Room:* ${room}\n*Items:* ${cart.map(i => i.name).join(', ')}\n*Total:* ₹${total}\n------------------\n_Sent via Datta Dash_`);
            window.location.href = `https://wa.me/919346825634?text=${text}`;
        }
    </script>
</body>
</html>

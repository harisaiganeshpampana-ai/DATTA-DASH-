<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINE-DASH | Premium Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-transition { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up { transform: translateY(0); opacity: 1; display: flex !important; }
        .slide-up-hidden { transform: translateY(50px); opacity: 0; display: none !important; }
        .slide-right { transform: translateX(0); opacity: 1; display: flex !important; }
        .slide-right-hidden { transform: translateX(100%); opacity: 0; display: none !important; }
        .payment-active { border-color: #dc2626 !important; background: rgba(220, 38, 38, 0.1) !important; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased overflow-x-hidden">

    <div id="launch-screen" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative bg-zinc-900 rounded-full p-12 border border-white/5 animate-pulse shadow-2xl">
            <span class="text-7xl">🙏</span>
        </div>
        <p class="mt-12 text-zinc-500 font-bold tracking-[0.4em] text-[10px] uppercase italic">Welcome to Datta Dash</p>
    </div>

    <div id="restaurant-selector" class="hidden min-h-screen p-6 flex flex-col items-center page-transition slide-up-hidden">
        <h1 class="text-3xl font-black italic text-red-600 tracking-tighter mb-4 mt-8 uppercase underline decoration-zinc-800">DINE-DASH</h1>
        <div id="city-badge" class="bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800 text-[9px] font-black uppercase tracking-widest text-zinc-400 mb-10 flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-ping"></span> Detecting City...
        </div>

        <div onclick="openRestaurant()" class="w-full max-w-sm bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl cursor-pointer active:scale-95 transition-transform">
            <div class="h-40 bg-red-900 flex items-center justify-center">
                <h2 class="text-5xl font-black italic text-white uppercase tracking-tighter shadow-2xl">TBC</h2>
            </div>
            <div class="p-6 text-center bg-[#111]">
                <h3 class="text-lg font-bold uppercase italic text-white">TBC Restaurant</h3>
                <p class="text-zinc-500 text-[9px] mb-4 tracking-widest uppercase italic font-black">24H Service • Near GLA Gate No. 1</p>
                <div class="flex justify-center gap-4 text-[9px] font-black uppercase tracking-widest italic">
                    <span class="text-green-500">Open Now</span>
                    <span class="text-red-500 font-black italic">Free Delivery</span>
                </div>
            </div>
        </div>
    </div>

    <div id="menu-app" class="hidden fixed inset-0 z-[500] bg-[#0f0f0f] page-transition slide-right-hidden flex-col overflow-hidden">
        <header class="bg-[#1a1a1a] p-5 border-b border-zinc-800 shadow-xl">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <button onclick="goHome()" class="p-2 bg-zinc-800 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                <h1 class="text-xl font-black text-red-600 italic tracking-tighter uppercase">TBC Menu</h1>
                <div class="flex gap-2">
                    <button onclick="toggleAI()" class="p-2.5 bg-zinc-800 rounded-full border border-zinc-700 text-red-500 shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                    </button>
                    <button onclick="toggleCart()" class="bg-red-600 p-2.5 rounded-full relative shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                        <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black px-1.5 rounded-full">0</span>
                    </button>
                </div>
            </div>
        </header>
        <nav class="bg-[#0f0f0f] border-b border-zinc-800 py-3 overflow-x-auto no-scrollbar">
            <div class="flex gap-8 px-6 whitespace-nowrap text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">
                <button onclick="showSection('veg')" class="cat-btn text-red-600">Pure Veg</button>
                <button onclick="showSection('nonveg')" class="cat-btn">Non-Veg Chicken</button>
                <button onclick="showSection('fastfood')" class="cat-btn">Fast Food</button>
                <button onclick="showSection('beverages')" class="cat-btn">Beverages</button>
            </div>
        </nav>
        <main class="flex-grow overflow-y-auto p-6 max-w-xl mx-auto pb-44 w-full">
            <div id="items-container" class="space-y-8"></div>
        </main>
    </div>

    <div id="ai-ui" class="fixed inset-0 bg-[#0a0a0a] z-[2000] hidden flex-col p-8 transition-all duration-300 transform translate-y-full opacity-0">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-6">
            <h2 class="text-3xl font-black italic text-red-600 uppercase">Voice AI</h2>
            <button onclick="toggleAI()" class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div id="ai-messages" class="flex-grow overflow-y-auto space-y-6 mb-6 text-sm no-scrollbar text-zinc-300"></div>
        <div class="flex gap-3 bg-zinc-900 p-2 rounded-3xl border border-zinc-800 shadow-2xl items-center">
            <input type="text" id="ai-input" placeholder="Ask prices..." class="flex-grow bg-transparent p-4 outline-none font-bold text-sm text-white">
            <button onclick="askAI()" class="bg-red-600 px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg italic">Send</button>
        </div>
    </div>

    <div id="cart-ui" class="fixed inset-0 bg-[#0a0a0a] z-[2100] hidden flex-col p-8 transition-all duration-300 transform translate-y-full opacity-0">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6"><h2 class="text-4xl font-black italic text-red-600 uppercase">My Order</h2><button onclick="toggleCart()" class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="mt-auto pt-6 border-t border-zinc-900">
            <p class="text-[9px] text-zinc-500 uppercase font-black tracking-widest mb-3 text-center italic">Select Payment Mode</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="setPayment('Online')" id="pay-online" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Online Payment</button>
                <button onclick="setPayment('COD')" id="pay-cod" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Cash on Delivery</button>
            </div>
            <div class="flex justify-between items-end mb-6"><button onclick="clearCart()" class="text-[10px] font-black text-zinc-700 uppercase underline tracking-tighter italic">Empty Order</button><span id="total" class="text-4xl font-black italic text-red-600">₹0</span></div>
            <div class="bg-zinc-900 rounded-[2rem] p-6 mb-6 border border-zinc-800 text-center"><p class="text-[9px] text-zinc-500 uppercase font-black tracking-widest mb-2 italic">GPS Position Secured ✓</p><input type="text" id="room" placeholder="EX: C-204 (ROOM)" class="w-full bg-transparent border-none text-2xl font-black text-white text-center uppercase outline-none tracking-widest"></div>
            <button onclick="sendOrder()" class="w-full bg-red-600 py-6 rounded-3xl font-black text-xl uppercase shadow-2xl shadow-red-900/40 active:scale-95 transition-transform italic tracking-tighter">Confirm on WhatsApp</button>
        </div>
    </div>

    <script>
        // FULL COMPREHENSIVE MENU FROM 10-PAGE PDF
        const menuData = {
            veg: [
                { name: "Delux Thali (Full Meal)", price: 180, cat: "Thali" }, { name: "TBC Special Thali", price: 250, cat: "Thali" },
                { name: "Matar Paneer", price: 190, cat: "Paneer" }, { name: "Paneer Tikka Butter Masala", price: 230, cat: "Paneer" },
                { name: "Kadhai Paneer (Spicy)", price: 220, cat: "Paneer" }, { name: "Paneer Butter Masala", price: 220, cat: "Paneer" },
                { name: "Dal Makhani", price: 200, cat: "Dal" }, { name: "Soya Malai Chaap Gravy", price: 210, cat: "Chaap" },
                { name: "Veg. Biryani", price: 150, cat: "Rice" }, { name: "Butter Naan", price: 35, cat: "Roti" }, { name: "Churchur Naan", price: 45, cat: "Roti" }
            ],
            nonveg: [
                { name: "Butter Chicken", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Murg Dum Dahi Handi", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Chicken Korma (Sweet)", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Kadai Chicken (Spicy)", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Chicken-Do Pyaz (Spicy)", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Champaran Chicken", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Chicken Changezi (Lemon)", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Chicken Lababdar (Creamy)", sizes: { "Quarter": 200, "Half Portion": 320, "Full Plate": 580 }, type: "nonveg" },
                { name: "TBC Special Chicken", sizes: { "Quarter": 180, "Half Portion": 320, "Full Plate": 580 }, type: "nonveg" },
                { name: "Chicken Masala", sizes: { "Quarter": 180, "Half Portion": 300, "Full Plate": 500 }, type: "nonveg" },
                { name: "Chicken Hyderabad Biryani", price: 200, type: "nonveg" },
                { name: "Chicken Roll", price: 120, type: "nonveg" },
                { name: "Fish Special", sizes: { "Half": 250, "Full": 450 }, type: "nonveg" },
                { name: "Egg Curry", price: 100, type: "nonveg" }
            ],
            fastfood: [
                { name: "Paneer Tikka Pizza", price: 200, cat: "Pizza" }, { name: "Farm Fresh Pizza", price: 180, cat: "Pizza" },
                { name: "Chicken Pizza", price: 250, cat: "Pizza" }, { name: "Veg Chowmein", price: 100, cat: "Chinese" },
                { name: "Chilly Paneer Masala", price: 190, cat: "Chinese" }, { name: "Paneer Burger", price: 90, cat: "Burger" },
                { name: "Chicken Sandwich", price: 150, cat: "Sandwich" }, { name: "Veg Maggi", price: 90, cat: "Maggi" }
            ],
            beverages: [{ name: "Kitkat Shake", price: 130 }, { name: "Oreo Shake", price: 130 }, { name: "Cold Coffee", price: 100 }, { name: "Virgin Mojito", price: 100 }]
        };

        let cart = []; let userLocation = ""; let paymentMode = "";

        // ROBUST SPLASH TRIGGER
        document.addEventListener('DOMContentLoaded', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    userLocation = `http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    document.getElementById('city-badge').innerText = pos.coords.latitude > 25 ? "City: Mathura ✓" : "City: Eluru ✓";
                });
            }
            setTimeout(() => {
                const splash = document.getElementById('launch-screen');
                const selector = document.getElementById('restaurant-selector');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    selector.classList.remove('hidden');
                    setTimeout(() => { selector.classList.add('slide-up'); selector.classList.remove('slide-up-hidden'); }, 50);
                }, 1000);
            }, 4000);
        });

        function setPayment(mode) { paymentMode = mode; document.getElementById('pay-online').classList.toggle('payment-active', mode === 'Online'); document.getElementById('pay-cod').classList.toggle('payment-active', mode === 'COD'); }
        function openRestaurant() { const app = document.getElementById('menu-app'); app.classList.remove('hidden'); setTimeout(() => { app.classList.add('slide-right'); app.classList.remove('slide-right-hidden'); }, 50); showSection('veg'); }
        function goHome() { const app = document.getElementById('menu-app'); app.classList.add('slide-right-hidden'); setTimeout(() => app.classList.add('hidden'), 500); }

        function showSection(id) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('text-red-600'));
            event.target.classList.add('text-red-600');
            document.getElementById('items-container').innerHTML = menuData[id].map(i => `
                <div class="bg-zinc-900/60 p-6 rounded-[2.5rem] border border-zinc-800 shadow-xl animate-in fade-in slide-in-from-bottom duration-500">
                    <div class="${i.type == 'nonveg' ? 'nonveg-dot' : 'veg-dot'} mb-4"></div>
                    <h3 class="font-black text-md uppercase italic text-white tracking-tighter mb-4">${i.name}</h3>
                    <div class="flex flex-col gap-3">
                        ${i.sizes ? Object.entries(i.sizes).map(([s, p]) => `
                            <button onclick="add('${i.name} (${s})', ${p})" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-3xl text-[10px] font-black uppercase tracking-widest flex justify-between items-center px-8 active:bg-red-600 shadow-inner"><span>${s}</span> <span class="text-red-500 italic font-black">₹${p}</span></button>`).join('') : `
                            <button onclick="add('${i.name}', ${i.price})" class="w-full bg-zinc-800 border border-zinc-700 p-5 rounded-3xl font-black text-xs uppercase flex justify-between items-center px-8 active:scale-95 transition-all italic tracking-tighter"><span>Full Plate</span> <span class="text-red-500 font-black italic">₹${i.price}</span></button>`}
                    </div>
                </div>`).join('');
        }

        function add(n, p) { cart.push({name:n, price:p}); updateCart(); }
        function remove(idx) { cart.splice(idx, 1); updateCart(); }
        function clearCart() { cart = []; updateCart(); }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total').innerText = '₹' + cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-zinc-900/70 p-5 rounded-3xl border border-zinc-800">
                    <div><p class="font-black text-[10px] uppercase text-white tracking-widest italic">${i.name}</p><p class="text-red-600 font-black italic text-sm mt-1">₹${i.price}</p></div>
                    <button onclick="remove(${idx})" class="p-2 text-zinc-700 hover:text-red-600 transition duration-300"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                </div>`).join('');
        }

        function toggleCart() { const ui = document.getElementById('cart-ui'); ui.classList.toggle('hidden'); setTimeout(() => { ui.classList.toggle('translate-y-full'); ui.classList.toggle('opacity-0'); }, 50); }
        function toggleAI() { const ui = document.getElementById('ai-ui'); ui.classList.toggle('hidden'); setTimeout(() => { ui.classList.toggle('translate-y-full'); ui.classList.toggle('opacity-0'); }, 50); }

        function askAI() {
            const input = document.getElementById('ai-input').value.toLowerCase();
            const box = document.getElementById('ai-messages');
            if(!input) return;
            box.innerHTML += `<div class="bg-red-600 p-5 rounded-3xl rounded-tr-none text-right font-black text-[10px] ml-14 italic uppercase text-white shadow-lg mb-4 tracking-widest">${input}</div>`;
            let reply = "Checking menu... we have 10 types of chicken curries and full thalis!";
            if(input.includes("chicken")) reply = "Our Butter Chicken and 9 other curries start at ₹180 for Quarter plates. Full Plate is ₹550.";
            if(input.includes("time") || input.includes("delivery")) reply = "We deliver to GLA Gate No. 1 in 20 minutes, 24/7!.";
            if(input.includes("thali")) reply = "Delux Thali is ₹180 and TBC Special is ₹250.";
            setTimeout(() => { box.innerHTML += `<div class="bg-zinc-900 p-6 rounded-3xl rounded-tl-none border border-zinc-800 mr-14 text-zinc-300 font-bold text-[10px] tracking-widest text-red-600 mb-4 italic">AI: ${reply}</div>`; box.scrollTop = box.scrollHeight; const m = new SpeechSynthesisUtterance(); m.text = reply; window.speechSynthesis.speak(m); }, 600);
            document.getElementById('ai-input').value = "";
        }

        function sendOrder() {
            const room = document.getElementById('room').value || "GPS Only";
            if(cart.length === 0) return alert("Empty Order!");
            if(!paymentMode) return alert("Select Payment Mode!");
            const text = encodeURIComponent(`*ORDER: DATTA DASH*\nPayment: ${paymentMode}\nLocation: ${userLocation}\nRoom: ${room}\nItems: ${cart.map(i => i.name).join(', ')}\nTotal: ₹${cart.reduce((s, i) => s + i.price, 0)}\nFrom: TBC Restaurant`);
            window.location.href = `https://wa.me/919346825634?text=${text}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINE-DASH | Premium Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased">

    <div id="launch-screen" class="fixed inset-0 z-[300] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative bg-zinc-900 rounded-full p-12 border border-white/5 shadow-2xl animate-pulse">
            <span class="text-7xl">🙏</span>
        </div>
        <p class="mt-12 text-zinc-500 font-bold tracking-[0.4em] text-[10px] uppercase italic">Welcome to Datta Dash</p>
    </div>

    <div id="restaurant-selector" class="hidden min-h-screen p-6 flex flex-col items-center animate-in fade-in duration-1000">
        <h1 class="text-3xl font-black italic text-red-600 tracking-tighter mb-10 mt-8">DINE-DASH</h1>
        <div onclick="openRestaurant('tbc')" class="w-full max-w-sm bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl cursor-pointer">
            <div class="h-44 bg-red-900 flex items-center justify-center">
                <h2 class="text-6xl font-black italic text-white uppercase">TBC</h2>
            </div>
            <div class="p-8 text-center">
                <h3 class="text-xl font-bold mb-2 uppercase">TBC Restaurant</h3>
                <p class="text-zinc-500 text-xs mb-6 uppercase tracking-widest italic">Veg. & Non Veg. • 24H Service</p>
                <div class="flex justify-center gap-6 text-[10px] font-black uppercase tracking-widest">
                    <span class="text-green-500">Open Now</span>
                    <span class="text-red-500 font-black italic">Free Delivery</span>
                </div>
            </div>
        </div>
    </div>

    <div id="menu-app" class="hidden min-h-screen animate-in slide-in-from-right duration-500">
        <header class="bg-[#1a1a1a] p-5 sticky top-0 z-50 border-b border-zinc-800 shadow-xl">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <button onclick="goHome()" class="p-2 bg-zinc-800 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                <h1 class="text-xl font-black text-red-600 italic tracking-tighter uppercase">TBC Menu</h1>
                <div class="flex gap-2">
                    <button onclick="toggleAI()" class="p-2.5 bg-zinc-800 rounded-full border border-zinc-700 shadow-lg">
                        <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                    </button>
                    <button onclick="toggleCart()" class="bg-red-600 p-2.5 rounded-full relative shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                        <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black px-1.5 rounded-full">0</span>
                    </button>
                </div>
            </div>
        </header>

        <nav class="bg-[#0f0f0f] sticky top-[73px] z-40 border-b border-zinc-800 py-3 overflow-x-auto no-scrollbar shadow-md">
            <div class="flex gap-8 px-6 whitespace-nowrap text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">
                <button onclick="showSection('veg')" class="cat-btn text-red-600 transition duration-300">Pure Veg</button>
                <button onclick="showSection('nonveg')" class="cat-btn transition duration-300">Non-Veg</button>
                <button onclick="showSection('chinese')" class="cat-btn transition duration-300">Fast Food</button>
                <button onclick="showSection('drinks')" class="cat-btn transition duration-300">Shakes/Mocktails</button>
            </div>
        </nav>

        <main class="p-6 max-w-xl mx-auto pb-44">
            <div id="items-container" class="grid gap-6"></div>
        </main>
    </div>

    <div id="ai-ui" class="fixed inset-0 bg-black/98 z-[400] hidden flex flex-col p-8">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-900 pb-4">
            <h2 class="text-3xl font-black italic text-red-600 tracking-tighter uppercase">Dash Voice AI</h2>
            <button onclick="toggleAI()" class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div id="ai-messages" class="flex-grow overflow-y-auto space-y-6 mb-6 text-sm no-scrollbar text-zinc-300 scroll-smooth">
            <div class="bg-zinc-900 p-5 rounded-3xl rounded-tl-none border border-zinc-800">Welcome! Ask about TBC's 180/- Chicken or any other item. I can also speak the answer!</div>
        </div>
        <div class="flex gap-3 bg-zinc-900 p-2 rounded-3xl border border-zinc-800 shadow-2xl items-center">
            <input type="text" id="ai-input" placeholder="Ask a question..." class="flex-grow bg-transparent p-4 outline-none font-bold text-sm text-white">
            <button onclick="askAI()" class="bg-red-600 px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg">Send</button>
        </div>
    </div>

    <div id="cart-ui" class="fixed inset-0 bg-[#0a0a0a] z-[500] hidden flex flex-col p-8">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <h2 class="text-4xl font-black italic text-red-600 tracking-tighter uppercase">My Cart</h2>
            <button onclick="toggleCart()" class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="mt-auto pt-8 border-t border-zinc-900">
            <div class="flex justify-between items-end mb-8">
                <button onclick="clearCart()" class="text-[10px] font-black text-zinc-700 uppercase tracking-widest">Clear Cart</button>
                <span id="total" class="text-4xl font-black italic tracking-tighter text-white font-black italic text-red-600">₹0</span>
            </div>
            <div class="bg-zinc-900 rounded-[2rem] p-6 mb-6 border border-zinc-800">
                <label class="text-[9px] text-zinc-500 uppercase font-black tracking-widest mb-3 block text-center italic">Room Number (Ex: C-204)</label>
                <input type="text" id="room" placeholder="ENTER HERE" class="w-full bg-transparent border-none text-2xl font-black text-red-600 focus:ring-0 placeholder:text-zinc-800 p-0 text-center uppercase outline-none tracking-widest">
            </div>
            <button onclick="sendOrder()" class="w-full bg-red-600 py-6 rounded-3xl font-black text-xl uppercase italic tracking-tighter shadow-2xl shadow-red-900/40">Order on WhatsApp</button>
        </div>
    </div>

    <script>
        // COMPREHENSIVE MENU DATA
        const menuData = {
            veg: [
                { name: "Matar Paneer", price: 190, cat: "Paneer Special" },
                { name: "Paneer Tikka Butter Masala", price: 230, cat: "Paneer Special" },
                { name: "Kadhai Paneer (Spicy)", price: 220, cat: "Paneer Special" },
                { name: "Paneer Lababdaar", price: 230, cat: "Paneer Special" },
                { name: "Dal Makhani", price: 200, cat: "Dal" },
                { name: "Malai Cofta", price: 220, cat: "Veg" },
                { name: "Veg. Biryani", price: 150, cat: "Rice" },
                { name: "Paneer Tikka Biryani", price: 180, cat: "Rice" },
                { name: "Tawa Roti", price: 12, cat: "Roti" },
                { name: "Butter Naan", price: 35, cat: "Roti" },
                { name: "Churchur Naan", price: 45, cat: "Roti" },
                { name: "Lachha Paratha", price: 35, cat: "Roti" }
            ],
            nonveg: [
                { name: "Butter Chicken", sizes: { "Qtr": 180, "Half": 300, "Full": 550 }, type: "nonveg" },
                { name: "Kadai Chicken", sizes: { "Qtr": 180, "Half": 300, "Full": 550 }, type: "nonveg" },
                { name: "Chicken Changezi", sizes: { "Qtr": 180, "Half": 300, "Full": 550 }, type: "nonveg" },
                { name: "Chicken Lababdar", sizes: { "Qtr": 200, "Half": 320, "Full": 580 }, type: "nonveg" },
                { name: "Chicken Biryani", price: 220, type: "nonveg" },
                { name: "Chicken Hyderabad Biryani", price: 200, type: "nonveg" },
                { name: "Egg Curry", price: 100, type: "nonveg" },
                { name: "Chicken Roll", price: 120, type: "nonveg" },
                { name: "Tandoori Chicken", sizes: { "Half": 250, "Full": 450 }, type: "nonveg" }
            ],
            chinese: [
                { name: "Paneer Tikka Pizza", price: 200, cat: "Pizza" },
                { name: "Farm Fresh Pizza", price: 180, cat: "Pizza" },
                { name: "Veg Chowmein", price: 100, cat: "Chinese" },
                { name: "Chilly Paneer", price: 190, cat: "Chinese" },
                { name: "Veg Maggi", price: 90, cat: "Maggi" },
                { name: "Paneer Burger", price: 90, cat: "Burger" },
                { name: "White Sauce Pasta", price: 180, cat: "Pasta" }
            ],
            drinks: [
                { name: "Kitkat Shake", price: 130 },
                { name: "Oreo Shake", price: 130 },
                { name: "Mango Shake", price: 120 },
                { name: "Cold Coffee", price: 100 },
                { name: "Virgin Mojito", price: 100 },
                { name: "Hot Kullad Tea", price: 20 }
            ]
        };

        let cart = [];

        // 4 SEC SPLASH SCREEN
        window.onload = () => {
            setTimeout(() => {
                const screen = document.getElementById('launch-screen');
                screen.style.opacity = '0';
                setTimeout(() => {
                    screen.classList.add('hidden');
                    document.getElementById('restaurant-selector').classList.remove('hidden');
                }, 1000);
            }, 4000);
        };

        function openRestaurant(id) {
            document.getElementById('restaurant-selector').classList.add('hidden');
            document.getElementById('menu-app').classList.remove('hidden');
            showSection('veg');
        }

        function goHome() {
            document.getElementById('menu-app').classList.add('hidden');
            document.getElementById('restaurant-selector').classList.remove('hidden');
        }

        function showSection(id) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('text-red-600'));
            event.target.classList.add('text-red-600');
            const list = menuData[id];
            document.getElementById('items-container').innerHTML = list.map(i => `
                <div class="bg-zinc-900/50 p-6 rounded-[2.5rem] border border-zinc-800 shadow-xl">
                    <div class="${i.type == 'nonveg' ? 'nonveg-dot' : 'veg-dot'} mb-3"></div>
                    <h3 class="font-black text-sm uppercase tracking-tight italic">${i.name}</h3>
                    <div class="mt-4 flex gap-2">
                        ${i.sizes ? Object.entries(i.sizes).map(([s, p]) => `
                            <button onclick="add('${i.name} (${s})', ${p})" class="flex-grow bg-zinc-800 border border-zinc-700 p-4 rounded-3xl text-[9px] font-black uppercase tracking-widest transition active:bg-red-600">
                                ${s} <span class="text-red-500 ml-1 italic">₹${p}</span>
                            </button>`).join('') : `
                            <button onclick="add('${i.name}', ${i.price})" class="w-full bg-zinc-800 border border-zinc-700 p-5 rounded-3xl font-black text-xs uppercase flex justify-between items-center px-8 active:scale-95 transition italic">
                                <span>Add Item</span> <span class="text-red-500 font-black italic">₹${i.price}</span>
                            </button>`}
                    </div>
                </div>`).join('');
        }

        function add(name, price) { cart.push({name, price}); updateCart(); }
        function remove(idx) { cart.splice(idx, 1); updateCart(); }
        function clearCart() { if(confirm("Clear order?")) { cart = []; updateCart(); } }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total').innerText = '₹' + cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-zinc-900/60 p-5 rounded-3xl border border-zinc-800 shadow-xl">
                    <div><p class="font-black text-[10px] uppercase text-white tracking-widest italic tracking-tighter">${i.name}</p><p class="text-red-600 font-black italic text-sm mt-1">₹${i.price}</p></div>
                    <button onclick="remove(${idx})" class="p-2 text-zinc-700 hover:text-red-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                </div>`).join('');
        }

        function toggleCart() { document.getElementById('cart-ui').classList.toggle('hidden'); }
        function toggleAI() { document.getElementById('ai-ui').classList.toggle('hidden'); }

        function askAI() {
            const input = document.getElementById('ai-input').value.toLowerCase();
            const box = document.getElementById('ai-messages');
            if(!input) return;
            box.innerHTML += `<div class="bg-red-600 p-5 rounded-3xl rounded-tr-none text-right font-black text-[10px] ml-14 italic uppercase text-white shadow-lg tracking-widest">${input}</div>`;
            
            let reply = "I am checking the TBC menu... ask about chicken portions, delivery time, or prices!";
            if(input.includes("chicken")) reply = "Our Butter Chicken and Kadai Chicken start at ₹180 for Quarter, ₹300 for Half, and ₹550 for Full.";
            if(input.includes("time") || input.includes("delivery")) reply = "We offer free delivery to GLA Gate No. 1 within 20 minutes, 24 hours a day.";
            if(input.includes("paneer")) reply = "Matar Paneer is ₹190 and Kadhai Paneer is ₹220.";

            setTimeout(() => { 
                box.innerHTML += `<div class="bg-zinc-900 p-6 rounded-3xl rounded-tl-none border border-zinc-800 mr-14 text-zinc-300 leading-relaxed italic uppercase font-bold text-[10px] tracking-widest text-red-600">AI: ${reply}</div>`; 
                box.scrollTop = box.scrollHeight; 
                speak(reply);
            }, 600);
            document.getElementById('ai-input').value = "";
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            window.speechSynthesis.speak(msg);
        }

        function sendOrder() {
            const room = document.getElementById('room').value;
            if(!room) return alert("Room Number required!");
            if(cart.length === 0) return alert("Cart is empty!");
            const total = cart.reduce((s, i) => s + i.price, 0);
            const text = encodeURIComponent(`*DINE-DASH ORDER*\nRoom: ${room}\nItems: ${cart.map(i => i.name).join(', ')}\nTotal: ₹${total}\nFrom: TBC Restaurant`);
            window.location.href = `https://wa.me/917088832255?text=${text}`;
        }
    </script>
</body>
</html>

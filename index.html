<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DATTA DASH | Premium Hostel Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased">

    <header class="bg-[#1a1a1a]/95 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-red-900/20 shadow-2xl">
        <div class="flex justify-between items-center max-w-xl mx-auto">
            <div>
                <h1 class="text-2xl font-black text-red-600 tracking-tighter leading-none">DATTA DASH</h1>
                <p class="text-[9px] text-gray-500 uppercase tracking-[0.3em] mt-1">GLA Gate No.1 • 24H Service</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleAI()" class="p-2.5 bg-zinc-800 rounded-full border border-zinc-700 shadow-lg">
                    <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                </button>
                <button onclick="toggleCart()" class="p-2.5 bg-red-600 rounded-full shadow-lg relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black px-1.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </header>

    <nav class="bg-[#0f0f0f] sticky top-[73px] z-40 border-b border-zinc-800 py-2">
        <div class="flex gap-4 px-4 overflow-x-auto no-scrollbar max-w-xl mx-auto whitespace-nowrap text-xs font-bold uppercase tracking-wider text-gray-500">
            <button onclick="scrollToSection('veg')" class="hover:text-red-500 py-2">Veg Special</button>
            <button onclick="scrollToSection('non-veg')" class="hover:text-red-500 py-2">Non-Veg Chicken</button>
            <button onclick="scrollToSection('breads')" class="hover:text-red-500 py-2">Breads & Roti</button>
            <button onclick="scrollToSection('chinese')" class="hover:text-red-500 py-2">Chinese & Snacks</button>
        </div>
    </nav>

    <main class="p-4 max-w-xl mx-auto space-y-10 pb-32">
        
        <section id="veg">
            <h2 class="text-xs font-black text-green-500 mb-4 tracking-widest uppercase flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Vegetarian Specials
            </h2>
            <div class="grid gap-3" id="veg-items"></div>
        </section>

        <section id="non-veg">
            <h2 class="text-xs font-black text-red-500 mb-4 tracking-widest uppercase flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> Non-Veg Chicken
            </h2>
            <div class="grid gap-3" id="nonveg-items"></div>
        </section>

        <section id="breads">
            <h2 class="text-xs font-black text-amber-500 mb-4 tracking-widest uppercase flex items-center gap-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span> Breads & Rotis
            </h2>
            <div class="grid gap-3" id="bread-items"></div>
        </section>
    </main>

    <div id="ai-ui" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col p-6 animate-in slide-in-from-bottom duration-300">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-red-600 italic">DASH AI</h2>
            <button onclick="toggleAI()" class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Close</button>
        </div>
        <div id="ai-messages" class="flex-grow overflow-y-auto space-y-4 mb-4 text-sm scroll-smooth">
            <div class="bg-zinc-900 p-4 rounded-2xl rounded-tl-none border border-zinc-800">
                Hello! I am the Datta Dash AI. How can I help you today?
            </div>
        </div>
        <div class="flex gap-2">
            <input type="text" id="ai-input" placeholder="Ask about delivery time, prices..." class="flex-grow bg-zinc-900 border border-zinc-800 rounded-xl p-4 focus:border-red-600 outline-none">
            <button onclick="askAI()" class="bg-red-600 p-4 rounded-xl font-bold">SEND</button>
        </div>
    </div>

    <div id="cart-ui" class="fixed inset-0 bg-[#0f0f0f] z-[100] hidden flex flex-col p-6">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
            <h2 class="text-3xl font-black italic">YOUR CART</h2>
            <button onclick="toggleCart()" class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Close</button>
        </div>
        <div id="cart-items-container" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
        <div class="mt-auto pt-6 border-t border-zinc-800">
            <div class="bg-zinc-900 rounded-2xl p-4 mb-6">
                <label class="text-[10px] text-zinc-500 uppercase font-bold mb-2 block">Delivery Address</label>
                <input type="text" id="room" placeholder="Enter Hostel Room Number" class="w-full bg-transparent border-none text-xl font-bold text-red-500 focus:ring-0 placeholder:text-zinc-700">
            </div>
            <div class="flex justify-between items-end mb-6">
                <span class="text-zinc-500 text-sm font-bold uppercase">Subtotal</span>
                <span id="total" class="text-3xl font-black italic tracking-tighter">₹0</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-red-600 py-5 rounded-2xl font-black text-xl shadow-xl shadow-red-900/40 active:scale-95 transition-transform uppercase tracking-tighter">PLACE ORDER ON WHATSAPP</button>
        </div>
    </div>

    <script>
        // Full Menu Data from PDF
        const menu = {
            veg: [
                { name: "Matar Paneer", price: 190, cat: "Paneer Special" },
                { name: "Paneer Tikka Butter Masala", price: 230, cat: "Paneer Special" },
                { name: "Kadhai Paneer", price: 220, cat: "Paneer Special" },
                { name: "Dal Makhani", price: 200, cat: "Dal" },
                { name: "Malai Kofta", price: 220, cat: "Veg" },
                { name: "Veg. Biryani", price: 150, cat: "Rice" }
            ],
            nonveg: [
                { name: "Butter Chicken", sizes: { "Qtr": 180, "Half": 300, "Full": 550 } },
                { name: "Kadai Chicken", sizes: { "Qtr": 180, "Half": 300, "Full": 550 } },
                { name: "Chicken Changezi", sizes: { "Qtr": 180, "Half": 300, "Full": 550 } },
                { name: "Chicken Masala", sizes: { "Qtr": 180, "Half": 300, "Full": 550 } },
                { name: "Chicken Biryani", price: 220 }
            ],
            breads: [
                { name: "Tawa Roti", price: 12 },
                { name: "Butter Roti", price: 14 },
                { name: "Lachha Paratha", price: 35 },
                { name: "Butter Naan", price: 35 },
                { name: "Churchur Naan", price: 45 }
            ]
        };

        let cart = [];

        function renderMenu() {
            // Veg Rendering
            document.getElementById('veg-items').innerHTML = menu.veg.map(i => `
                <div class="bg-[#1a1a1a] p-4 rounded-2xl border border-zinc-800 flex justify-between items-center group">
                    <div>
                        <div class="veg-dot mb-1"></div>
                        <h3 class="font-bold text-sm tracking-tight">${i.name}</h3>
                        <p class="text-zinc-500 text-[10px]">${i.cat}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-red-500 tracking-tighter italic">₹${i.price}</span>
                        <button onclick="add('${i.name}', ${i.price})" class="bg-zinc-800 p-2 rounded-xl text-xs font-black active:bg-green-600 transition-colors">ADD</button>
                    </div>
                </div>
            `).join('');

            // Non-Veg Rendering
            document.getElementById('nonveg-items').innerHTML = menu.nonveg.map(i => `
                <div class="bg-[#1a1a1a] p-4 rounded-2xl border border-zinc-800">
                    <div class="nonveg-dot mb-2"></div>
                    <h3 class="font-bold text-sm mb-3">${i.name}</h3>
                    <div class="flex flex-wrap gap-2">
                        ${i.sizes ? Object.entries(i.sizes).map(([s, p]) => `
                            <button onclick="add('${i.name} (${s})', ${p})" class="flex-grow bg-zinc-800/50 border border-zinc-700 px-3 py-2 rounded-xl text-[10px] font-black flex justify-between items-center hover:bg-zinc-700 transition-colors">
                                <span>${s}</span> <span class="text-red-500 italic">₹${p}</span>
                            </button>
                        `).join('') : `
                            <div class="flex justify-between items-center w-full">
                                <span class="text-red-500 font-black italic text-sm">₹${i.price}</span>
                                <button onclick="add('${i.name}', ${i.price})" class="bg-zinc-800 px-4 py-2 rounded-xl text-xs font-black uppercase">Add Item</button>
                            </div>
                        `}
                    </div>
                </div>
            `).join('');

            // Breads Rendering
            document.getElementById('bread-items').innerHTML = menu.breads.map(i => `
                <div class="bg-[#1a1a1a] p-3 rounded-2xl border border-zinc-800 flex justify-between items-center">
                    <h3 class="font-bold text-xs tracking-tight">${i.name}</h3>
                    <div class="flex items-center gap-3">
                        <span class="text-zinc-400 text-xs italic">₹${i.price}</span>
                        <button onclick="add('${i.name}', ${i.price})" class="bg-zinc-800 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">Add</button>
                    </div>
                </div>
            `).join('');
        }

        function add(name, price) {
            cart.push({name, price});
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total').innerText = '₹' + cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-items-container').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800 animate-in zoom-in duration-200">
                    <div class="flex flex-col">
                        <span class="font-bold text-sm tracking-tight">${i.name}</span>
                        <span class="text-red-500 font-black italic text-xs mt-1">₹${i.price}</span>
                    </div>
                    <button onclick="remove(${idx})" class="text-zinc-600 text-xs font-bold uppercase">Remove</button>
                </div>
            `).join('');
        }

        function remove(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        function toggleCart() { document.getElementById('cart-ui').classList.toggle('hidden'); }
        function toggleAI() { document.getElementById('ai-ui').classList.toggle('hidden'); }

        function askAI() {
            const input = document.getElementById('ai-input').value.toLowerCase();
            const box = document.getElementById('ai-messages');
            if(!input) return;

            box.innerHTML += `<div class="bg-red-600 p-4 rounded-2xl rounded-tr-none text-right font-bold ml-12">${input}</div>`;
            
            let reply = "I'm still learning the menu. Please check the list or call us!";
            if(input.includes("price") || input.includes("chicken")) reply = "Our Chicken Quarter starts at ₹180 and Half is ₹300. We also have Butter Chicken and Changezi!";
            if(input.includes("time") || input.includes("delivery")) reply = "We aim for delivery within 20 minutes to GLA Gate No. 1!";
            if(input.includes("veg") || input.includes("paneer")) reply = "We have many Paneer specials starting at ₹190, plus various Dal and Chinese options!";

            setTimeout(() => {
                box.innerHTML += `<div class="bg-zinc-900 p-4 rounded-2xl rounded-tl-none border border-zinc-800 mr-12">${reply}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 600);
            
            document.getElementById('ai-input').value = "";
        }

        function sendOrder() {
            const room = document.getElementById('room').value;
            if(!room) return alert("Please enter your hostel room number!");
            if(cart.length === 0) return alert("Your cart is empty!");
            
            const total = cart.reduce((s, i) => s + i.price, 0);
            const items = cart.map(i => i.name).join(', ');
            const text = encodeURIComponent(`*DATTA DASH ORDER*\n------------------\n*Room:* ${room}\n*Items:* ${items}\n*Total:* ₹${total}\n------------------\n_Please confirm the order!_`);
            window.location.href = `https://wa.me/917088832255?text=${text}`;
        }

        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        renderMenu();
    </script>
</body>
</html>

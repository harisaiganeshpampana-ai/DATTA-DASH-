<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINE-DASH | TBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // EMERGENCY OVERRIDE: This will hide the splash screen no matter what
        function startApp() {
            document.getElementById('launch-screen').style.display = 'none';
            document.getElementById('restaurant-selector').style.display = 'flex';
            document.getElementById('restaurant-selector').style.opacity = '1';
        }
        window.onload = () => setTimeout(startApp, 2500);
    </script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased">

    <div id="launch-screen" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="bg-zinc-900 rounded-full p-12 animate-pulse"><span class="text-7xl">🙏</span></div>
        <p class="mt-8 text-zinc-500 font-bold tracking-widest text-[10px] uppercase">Loading Datta Dash...</p>
    </div>

    <div id="restaurant-selector" class="fixed inset-0 z-[500] bg-[#0f0f0f] flex-col items-center p-6" style="display: none; opacity: 0; transition: opacity 0.5s;">
        <h1 class="text-3xl font-black italic text-red-600 mb-4 mt-8 uppercase">DINE-DASH</h1>
        <div class="bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800 text-[9px] font-black uppercase mb-10 text-zinc-400">Sanskriti University ✓</div>
        <div onclick="openRestaurant()" class="w-full max-w-sm bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl">
            <div class="h-40 bg-red-900 flex items-center justify-center"><h2 class="text-5xl font-black italic">TBC</h2></div>
            <div class="p-6 text-center">
                <h3 class="text-xl font-bold mb-2 uppercase italic">TBC Restaurant</h3>
                <p class="text-zinc-500 text-[9px] uppercase font-black">11 AM - 10 PM • Near GLA Gate No-1</p>
            </div>
        </div>
    </div>

    <div id="menu-app" class="fixed inset-0 z-[600] bg-[#0f0f0f] flex-col overflow-hidden" style="display: none;">
        <header class="bg-[#1a1a1a] p-5 border-b border-zinc-800 flex justify-between items-center">
            <button onclick="location.reload()" class="p-2 bg-zinc-800 rounded-xl">Back</button>
            <h1 class="text-xl font-black text-red-600 italic uppercase">TBC Menu</h1>
            <button onclick="toggleCart()" class="bg-red-600 p-2.5 rounded-full relative">🛒<span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black px-1.5 rounded-full">0</span></button>
        </header>
        <nav class="bg-[#0f0f0f] border-b border-zinc-800 py-3 overflow-x-auto no-scrollbar flex gap-8 px-6 whitespace-nowrap text-[10px] font-black uppercase text-zinc-500">
            <button onclick="showSection('veg')" class="cat-btn text-red-600">Pure Veg</button>
            <button onclick="showSection('nonveg_curry')" class="cat-btn">Chicken & Biryani</button>
            <button onclick="showSection('tandoor')" class="cat-btn">Tandoor & Fish</button>
            <button onclick="showSection('fastfood')" class="cat-btn">Fast Food</button>
        </nav>
        <main id="items-container" class="flex-grow overflow-y-auto p-6 space-y-8 pb-40"></main>
    </div>

    <div id="cart-ui" class="fixed inset-0 z-[2100] bg-black flex-col p-6 transition-transform translate-y-full flex">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-900 pb-4"><h2 class="text-3xl font-black italic text-red-600 uppercase">My Order</h2><button onclick="toggleCart()" class="text-zinc-500 font-bold uppercase text-[10px]">Close</button></div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-4"></div>
        <div class="mt-auto border-t border-zinc-900 pt-6">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="paymentMode='Online'" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-[10px] font-black uppercase">Online</button>
                <button onclick="paymentMode='COD'" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-[10px] font-black uppercase">COD</button>
            </div>
            <div class="flex justify-between items-end mb-6"><span id="cart-total" class="text-4xl font-black italic text-red-600">₹0</span></div>
            <div class="bg-zinc-900 rounded-[2rem] p-6 mb-6 border border-zinc-800"><input type="text" id="room" placeholder="HOSTEL & ROOM" class="w-full bg-transparent border-none text-xl font-black text-white text-center uppercase outline-none"></div>
            <button onclick="sendOrder()" class="w-full bg-red-600 py-6 rounded-3xl font-black text-xl uppercase italic">Order Now</button>
        </div>
    </div>

    <script>
        const menuData = {
            veg: [{ name: "Delux Thali", price: 180, type: "veg" }, { name: "TBC Special Thali", price: 250, type: "veg" }, { name: "Matar Paneer", price: 190, type: "veg" }],
            nonveg_curry: [
                { name: "Chicken Hyderabad Biryani", price: 200, type: "nonveg" },
                { name: "Butter Chicken", sizes: { "Q": 180, "H": 300, "F": 550 }, type: "nonveg" },
                { name: "Murg Dum Dahi Handi", sizes: { "Q": 180, "H": 300, "F": 550 }, type: "nonveg" },
                { name: "Chicken Lababdar", sizes: { "Q": 200, "H": 320, "F": 580 }, type: "nonveg" },
                { name: "Egg Curry", price: 100, type: "nonveg" }
            ],
            tandoor: [
                { name: "Tandoori Chicken", sizes: { "H": 250, "F": 450 }, type: "nonveg" },
                { name: "Afgani Chicken", sizes: { "H": 300, "F": 550 }, type: "nonveg" },
                { name: "Fish Curry", sizes: { "H": 250, "F": 450 }, type: "nonveg" }
            ],
            fastfood: [
                { name: "Chicken Pizza", price: 250, type: "nonveg" }, { name: "Chicken Burger", price: 120, type: "nonveg" }
            ]
        };

        let cart = []; let paymentMode = "";

        function openRestaurant() {
            document.getElementById('restaurant-selector').style.display = 'none';
            document.getElementById('menu-app').style.display = 'flex';
            showSection('veg');
        }

        function showSection(id) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('text-red-600'));
            document.getElementById('items-container').innerHTML = menuData[id].map(i => `
                <div class="bg-zinc-900/60 p-6 rounded-[2.5rem] border border-zinc-800 shadow-xl">
                    <div class="${i.type == 'nonveg' ? 'nonveg-dot' : 'veg-dot'} mb-4"></div>
                    <h3 class="font-black text-md uppercase italic text-white mb-4">${i.name}</h3>
                    <div class="flex flex-col gap-3">
                        ${i.sizes ? Object.entries(i.sizes).map(([s, p]) => `
                            <button onclick="addToCart('${i.name} (${s})', ${p})" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-3xl flex justify-between px-8"><span>${s}</span> <span class="text-red-500 font-black">₹${p}</span></button>`).join('') : `
                            <button onclick="addToCart('${i.name}', ${i.price})" class="w-full bg-zinc-800 border border-zinc-700 p-5 rounded-3xl flex justify-between px-8"><span>Add</span> <span class="text-red-500 font-black">₹${i.price}</span></button>`}
                    </div>
                </div>`).join('');
        }

        function addToCart(n, p) { cart.push({name:n, price:p}); updateCartUI(); }
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = '₹' + cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `<div class="flex justify-between p-4 bg-zinc-900 rounded-2xl"><span>${i.name}</span><span>₹${i.price}</span></div>`).join('');
        }

        function toggleCart() { document.getElementById('cart-ui').classList.toggle('translate-y-full'); }

        function sendOrder() {
            const room = document.getElementById('room').value || "Not Specified";
            if(!paymentMode || cart.length === 0) return alert("Select Payment/Items!");
            const text = encodeURIComponent(`*ORDER: DATTA DASH*\n*Customer:* Hari Sai Ganesh\n*Payment:* ${paymentMode}\n*Room:* ${room}\n*Items:* ${cart.map(i => i.name).join(', ')}\n*Total:* ₹${cart.reduce((s, i) => s + i.price, 0)}`);
            window.location.href = `https://wa.me/919346825634?text=${text}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINE-DASH | Premium Delivery</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* FAIL-PROOF TRANSITIONS */
        .page-transition { transition: all 0.6s ease-in-out; }
        .visible-flex { display: flex !important; opacity: 1 !important; transform: translateY(0) !important; }
        .hidden-screen { display: none !important; opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased overflow-x-hidden">

    <div id="launch-screen" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative bg-zinc-900 rounded-full p-12 border border-white/5 animate-pulse shadow-2xl">
            <span class="text-7xl">🙏</span>
        </div>
        <p class="mt-12 text-zinc-500 font-bold tracking-[0.4em] text-[10px] uppercase italic text-center">Welcome to Datta Dash</p>
    </div>

    <div id="restaurant-selector" class="fixed inset-0 z-[500] bg-[#0f0f0f] flex-col items-center p-6 page-transition opacity-0 translate-y-10" style="display: none;">
        <h1 class="text-3xl font-black italic text-red-600 tracking-tighter mb-4 mt-8 uppercase underline decoration-zinc-800">DINE-DASH</h1>
        <div id="city-badge" class="bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800 text-[9px] font-black uppercase tracking-widest text-zinc-400 mb-10 flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-ping"></span> Detecting City...
        </div>
        <div onclick="openRestaurant()" class="w-full max-w-sm bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 shadow-2xl cursor-pointer active:scale-95 transition-transform">
            <div class="h-40 bg-red-900 flex items-center justify-center"><h2 class="text-5xl font-black italic text-white uppercase tracking-tighter">TBC</h2></div>
            <div class="p-6 text-center bg-[#111]">
                <h3 class="text-xl font-bold mb-2 uppercase italic text-white">TBC Restaurant</h3>
                <p class="text-zinc-500 text-[9px] mb-4 tracking-widest uppercase italic font-black">24H Service • Near GLA Gate No-1</p>
                <div class="flex justify-center gap-4 text-[9px] font-black uppercase tracking-widest italic"><span class="text-green-500">Open Now</span><span class="text-red-500 font-black italic">Free Delivery</span></div>
            </div>
        </div>
    </div>

    <div id="menu-app" class="fixed inset-0 z-[600] bg-[#0f0f0f] flex-col overflow-hidden page-transition opacity-0 translate-x-full" style="display: none;">
        <header class="bg-[#1a1a1a] p-5 border-b border-zinc-800 shadow-xl">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <button onclick="goHome()" class="p-2 bg-zinc-800 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                <h1 class="text-xl font-black text-red-600 italic tracking-tighter uppercase">TBC Menu</h1>
                <div class="flex gap-2">
                    <button onclick="toggleAI()" class="p-2.5 bg-zinc-800 rounded-full border border-zinc-700 text-red-500 shadow-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg></button>
                    <button onclick="toggleCart()" class="bg-red-600 p-2.5 rounded-full relative shadow-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black px-1.5 rounded-full">0</span></button>
                </div>
            </div>
        </header>
        <nav class="bg-[#0f0f0f] border-b border-zinc-800 py-3 overflow-x-auto no-scrollbar">
            <div class="flex gap-8 px-6 whitespace-nowrap text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">
                <button onclick="showSection('veg')" class="cat-btn text-red-600">Pure Veg</button>
                <button onclick="showSection('nonveg')" class="cat-btn">Non-Veg Main</button>
                <button onclick="showSection('tandoor')" class="cat-btn">Tandoor/Fish</button>
                <button onclick="showSection('continental')" class="cat-btn">Continental</button>
                <button onclick="showSection('drinks')" class="cat-btn">Beverages</button>
            </div>
        </nav>
        <main class="flex-grow overflow-y-auto p-6 max-w-xl mx-auto pb-44 w-full">
            <div id="items-container" class="space-y-8"></div>
        </main>
    </div>

    <script>
        const menuData = {
            veg: [
                { name: "Delux Thali (Full Meal)", price: 180 }, { name: "TBC Special Thali", price: 250 },
                { name: "Matar Paneer", price: 190 }, { name: "Dal Makhani", price: 200 },
                { name: "Mix Veg.", price: 160 }, { name: "Lachha Paratha", price: 35 }
            ],
            nonveg: [
                { name: "Butter Chicken", sizes: { "Quarter": 180, "Half": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Kadai Chicken (Spicy)", sizes: { "Quarter": 180, "Half": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Chicken Changezi", sizes: { "Quarter": 180, "Half": 300, "Full Plate": 550 }, type: "nonveg" },
                { name: "Chicken Lababdar", sizes: { "Quarter": 200, "Half": 320, "Full Plate": 580 }, type: "nonveg" },
                { name: "Egg Curry", price: 100, type: "nonveg" }
            ],
            tandoor: [
                { name: "Tandoori Chicken", sizes: { "Half": 250, "Full": 450 }, type: "nonveg" },
                { name: "Afgani Chicken", sizes: { "Half": 300, "Full": 550 }, type: "nonveg" },
                { name: "Fish Special", sizes: { "Half": 250, "Full": 450 }, type: "nonveg" },
                { name: "Chicken Tikka", price: 280, type: "nonveg" },
                { name: "Fish Curry", sizes: { "Half": 250, "Full": 450 }, type: "nonveg" }
            ],
            continental: [
                { name: "Chicken Pizza", price: 250 }, { name: "Chicken Burger", price: 120 },
                { name: "Chicken Pasta", price: 220 }, { name: "Chicken Maggie", price: 140 },
                { name: "Chicken Sandwich", price: 150 }
            ],
            drinks: [
                { name: "Kitkat Shake", price: 130 }, { name: "Hot Kullad Tea", price: 20 },
                { name: "Cold Coffee", price: 100 }, { name: "Virgin Mojito", price: 100 }
            ]
        };

        let cart = []; let userLocation = "";

        // FORCE STARTUP LOGIC
        window.addEventListener('load', () => {
            const splash = document.getElementById('launch-screen');
            const selector = document.getElementById('restaurant-selector');

            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    selector.style.display = 'flex';
                    setTimeout(() => {
                        selector.style.opacity = '1';
                        selector.style.transform = 'translateY(0)';
                    }, 50);
                }, 1000);
            }, 4000);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    userLocation = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    document.getElementById('city-badge').innerText = "Location Secured ✓";
                });
            }
        });

        function openRestaurant() {
            const selector = document.getElementById('restaurant-selector');
            const app = document.getElementById('menu-app');
            selector.style.opacity = '0';
            setTimeout(() => {
                selector.style.display = 'none';
                app.style.display = 'flex';
                setTimeout(() => {
                    app.style.opacity = '1';
                    app.style.transform = 'translateX(0)';
                }, 50);
                showSection('veg');
            }, 500);
        }

        function goHome() {
            location.reload(); // Simplest way to return without bugs
        }

        function showSection(id) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('text-red-600'));
            event.target.classList.add('text-red-600');
            document.getElementById('items-container').innerHTML = menuData[id].map(i => `
                <div class="bg-zinc-900/60 p-6 rounded-[2.5rem] border border-zinc-800 shadow-xl">
                    <div class="${i.type == 'nonveg' ? 'nonveg-dot' : 'veg-dot'} mb-4"></div>
                    <h3 class="font-black text-md uppercase italic text-white tracking-tighter mb-4">${i.name}</h3>
                    <div class="flex flex-col gap-3">
                        ${i.sizes ? Object.entries(i.sizes).map(([s, p]) => `
                            <button onclick="add('${i.name} (${s})', ${p})" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-3xl text-[10px] font-black uppercase tracking-widest flex justify-between items-center px-8 active:bg-red-600"><span>${s}</span> <span class="text-red-500 italic font-black">₹${p}</span></button>`).join('') : `
                            <button onclick="add('${i.name}', ${i.price})" class="w-full bg-zinc-800 border border-zinc-700 p-5 rounded-3xl font-black text-xs uppercase flex justify-between items-center px-8 active:scale-95 transition-all italic tracking-tighter"><span>Add to Cart</span> <span class="text-red-500 font-black italic">₹${i.price}</span></button>`}
                    </div>
                </div>`).join('');
        }

        function add(n, p) { cart.push({name:n, price:p}); alert("Added: " + n); }
        function sendOrder() {
            const text = encodeURIComponent(`*ORDER: DATTA DASH*\nLocation: ${userLocation}\nItems: ${cart.map(i => i.name).join(', ')}\nTotal: ₹${cart.reduce((s, i) => s + i.price, 0)}`);
            window.location.href = `https://wa.me/919346825634?text=${text}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINE-DASH | Premium Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased">

    <div id="restaurant-selector" class="min-h-screen p-6 flex flex-col items-center">
        <h1 class="text-3xl font-black italic text-red-500 tracking-tighter mb-12 mt-8">DINE-DASH</h1>
        <p class="text-zinc-500 text-[10px] font-black tracking-[0.4em] uppercase mb-8">Select Restaurant</p>

        <div onclick="openRestaurant('tbc')" class="w-full max-w-sm bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 active:scale-95 transition-transform duration-300 shadow-2xl">
            <div class="h-48 bg-red-900 flex items-center justify-center border-b border-zinc-800">
                <h2 class="text-6xl font-black italic tracking-tighter text-white">TBC</h2>
            </div>
            <div class="p-8 text-center">
                <h3 class="text-xl font-bold mb-2 uppercase tracking-tight">TBC Restaurant</h3>
                <p class="text-zinc-500 text-xs mb-6 font-medium uppercase tracking-widest">Authentic Veg & Non-Veg Cuisine</p>
                <div class="flex justify-center gap-4 text-[9px] font-black uppercase tracking-widest">
                    <span class="text-green-500">Open Now</span>
                    <span class="text-red-500">Free Delivery</span>
                </div>
            </div>
        </div>
        
        <p class="mt-12 text-zinc-700 text-[10px] font-bold">More Restaurants Coming Soon...</p>
    </div>

    <div id="menu-app" class="hidden min-h-screen">
        <header class="bg-[#1a1a1a] p-5 sticky top-0 z-50 border-b border-zinc-800">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <button onclick="goHome()" class="text-zinc-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                <h1 class="text-xl font-black text-red-600 italic tracking-tighter">TBC MENU</h1>
                <button onclick="toggleCart()" class="bg-red-600 p-2.5 rounded-full relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black px-1.5 rounded-full">0</span>
                </button>
            </div>
        </header>

        <nav class="bg-[#0f0f0f] sticky top-[73px] z-40 border-b border-zinc-800 py-3 overflow-x-auto no-scrollbar">
            <div class="flex gap-6 px-6 whitespace-nowrap text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500">
                <button onclick="showSection('veg')" class="cat-btn text-red-600">Pure Veg</button>
                <button onclick="showSection('nonveg')" class="cat-btn">Non-Veg</button>
                <button onclick="showSection('snacks')" class="cat-btn">Snacks & Fast Food</button>
                <button onclick="showSection('drinks')" class="cat-btn">Shakes & Mocktails</button>
            </div>
        </nav>

        <main class="p-6 max-w-xl mx-auto pb-40">
            <div id="items-container" class="space-y-6"></div>
        </main>
    </div>

    <div id="cart-ui" class="fixed inset-0 bg-black z-[100] hidden flex flex-col p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-black italic text-red-600">MY CART</h2>
            <button onclick="toggleCart()" class="text-zinc-500 font-black text-[10px]">CLOSE</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 no-scrollbar"></div>
        <div class="mt-auto pt-8 border-t border-zinc-800">
            <div class="flex justify-between items-end mb-6">
                <button onclick="clearCart()" class="text-[9px] font-black text-zinc-600 uppercase tracking-widest">Clear All</button>
                <span id="total" class="text-4xl font-black italic tracking-tighter">₹0</span>
            </div>
            <input type="text" id="room" placeholder="ROOM NUMBER" class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-4 text-center text-xl font-black text-red-500 outline-none uppercase">
            <button onclick="sendOrder()" class="w-full bg-red-600 py-6 rounded-2xl font-black text-xl uppercase tracking-tighter italic">Order via WhatsApp</button>
        </div>
    </div>

    <script>
        const menuData = {
            veg: [
                { name: "Matar Paneer", price: 190, cat: "Paneer Special" },
                { name: "Paneer Tikka Butter Masala", price: 230, cat: "Paneer Special" },
                { name: "Kadhai Paneer", price: 220, cat: "Paneer Special" },
                { name: "Paneer Changezi (Lemon)", price: 230, cat: "Paneer Special" },
                { name: "Shahi Paneer (Sweet)", price: 220, cat: "Paneer Special" },
                { name: "Paneer Bhurji", price: 270, cat: "Paneer Special" },
                { name: "Dal Makhani", price: 200, cat: "Dal" },
                { name: "Dal Tadka", price: 140, cat: "Dal" },
                { name: "Malai Cofta", price: 220, cat: "Veg" },
                { name: "Mix Veg", price: 160, cat: "Veg" },
                { name: "Veg. Biryani", price: 150, cat: "Rice" },
                { name: "Jeera Rice", price: 100, cat: "Rice" },
                { name: "Tawa Roti", price: 12, cat: "Breads" },
                { name: "Butter Roti", price: 14, cat: "Breads" },
                { name: "Butter Naan", price: 35, cat: "Breads" },
                { name: "Churchur Naan", price: 45, cat: "Breads" }
            ],
            nonveg: [
                { name: "Butter Chicken", sizes: { "Qtr": 180, "Half": 300, "Full": 550 }, type: "nonveg" },
                { name: "Kadai Chicken", sizes: { "Qtr": 180, "Half": 300, "Full": 550 }, type: "nonveg" },
                { name: "Chicken Changezi", sizes: { "Qtr": 180, "Half": 300, "Full": 550 }, type: "nonveg" },
                { name: "Chicken Lababdar", sizes: { "Qtr": 200, "Half": 320, "Full": 580 }, type: "nonveg" },
                { name: "Chicken Biryani", price: 220, type: "nonveg" },
                { name: "Egg Curry", price: 100, type: "nonveg" },
                { name: "Egg Biryani", price: 150, type: "nonveg" },
                { name: "Fish Special", sizes: { "Half": 250, "Full": 450 }, type: "nonveg" }
            ],
            snacks: [
                { name: "Paneer Tikka Pizza", price: 200, cat: "Pizza" },
                { name: "Farm Fresh Pizza", price: 180, cat: "Pizza" },
                { name: "Veg Chowmein", price: 100, cat: "Chinese" },
                { name: "Chilly Paneer", price: 190, cat: "Chinese" },
                { name: "Veg Sandwich", price: 80, cat: "Sandwich" },
                { name: "Paneer Burger", price: 90, cat: "Burger" },
                { name: "Aloo Tikki Wrap", price: 90, cat: "Wrap" },
                { name: "Veg Maggi", price: 90, cat: "Maggi" }
            ],
            drinks: [
                { name: "Kitkat Shake", price: 130 },
                { name: "Oreo Shake", price: 130 },
                { name: "Mango Shake", price: 120 },
                { name: "Cold Coffee", price: 100 },
                { name: "Virgin Mojito", price: 100 },
                { name: "Blue Lagoon Mojito", price: 120 },
                { name: "Hot Kullad Tea", price: 20 }
            ]
        };

        let cart = [];

        function openRestaurant(id) {
            document.getElementById('restaurant-selector').classList.add('hidden');
            document.getElementById('menu-app').classList.remove('hidden');
            showSection('veg');
        }

        function goHome() {
            document.getElementById('menu-app').classList.add('hidden');
            document.getElementById('restaurant-selector').classList.remove('hidden');
        }

        function showSection(id) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('text-red-600'));
            event.target.classList.add('text-red-600');
            
            const list = menuData[id];
            document.getElementById('items-container').innerHTML = list.map(i => `
                <div class="bg-zinc-900/50 p-5 rounded-[2rem] border border-zinc-800">
                    <div class="${i.type == 'nonveg' ? 'nonveg-dot' : 'veg-dot'} mb-2"></div>
                    <h3 class="font-black text-sm uppercase tracking-tight">${i.name}</h3>
                    <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest mt-1">${i.cat || ''}</p>
                    <div class="mt-4 flex gap-2">
                        ${i.sizes ? Object.entries(i.sizes).map(([s, p]) => `
                            <button onclick="add('${i.name} (${s})', ${p})" class="flex-grow bg-zinc-800 border border-zinc-700 p-3 rounded-2xl text-[9px] font-black uppercase transition active:bg-red-600">
                                ${s} <span class="text-red-500 ml-1">₹${p}</span>
                            </button>`).join('') : `
                            <button onclick="add('${i.name}', ${i.price})" class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-2xl font-black text-xs uppercase flex justify-between items-center px-6">
                                <span>Add Item</span> <span>₹${i.price}</span>
                            </button>`}
                    </div>
                </div>`).join('');
        }

        function add(name, price) { cart.push({name, price}); updateCart(); }
        function remove(idx) { cart.splice(idx, 1); updateCart(); }
        function clearCart() { cart = []; updateCart(); }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total').innerText = '₹' + cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-zinc-900/50 p-5 rounded-3xl border border-zinc-800">
                    <div><p class="font-black text-[10px] uppercase">${i.name}</p><p class="text-red-600 font-black italic text-sm mt-1">₹${i.price}</p></div>
                    <button onclick="remove(${idx})" class="text-zinc-700"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                </div>`).join('');
        }

        function toggleCart() { document.getElementById('cart-ui').classList.toggle('hidden'); }

        function sendOrder() {
            const room = document.getElementById('room').value;
            if(!room) return alert("Room Number required!");
            if(cart.length === 0) return alert("Cart empty!");
            const total = cart.reduce((s, i) => s + i.price, 0);
            const text = encodeURIComponent(`*DINE-DASH ORDER*\n------------------\n*Room:* ${room}\n*Items:* ${cart.map(i => i.name).join(', ')}\n*Total:* ₹${total}\n------------------\n_From: TBC Restaurant_`);
            window.location.href = `https://wa.me/917088832255?text=${text}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DATTA DASH | TBC Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f4f4f6] text-zinc-900 font-sans">

    <div id="splash" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center transition-all duration-700" onclick="launch()">
        <div class="bg-red-600 w-32 h-32 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(220,38,38,0.5)] animate-pulse">
            <h1 class="text-4xl font-black text-white italic">TBC</h1>
        </div>
        <p class="mt-8 text-white font-bold tracking-[0.3em] text-[10px]">TAP TO EXPLORE MENU</p>
    </div>

    <div id="app" class="hidden">
        <header class="bg-white p-4 sticky top-0 z-50 shadow-sm border-b">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <div>
                    <h1 class="text-xl font-black text-red-600 tracking-tighter">DATTA DASH</h1>
                    <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">GLA Gate No.1 • 24H Service</p>
                </div>
                <button onclick="toggleCart()" class="relative bg-zinc-100 p-2.5 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold px-1.5 rounded-full">0</span>
                </button>
            </div>
        </header>

        <div class="bg-white py-4 overflow-x-auto no-scrollbar flex gap-6 px-4 border-b">
            <div onclick="filter('veg')" class="flex flex-col items-center gap-1 min-w-[70px]">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200" class="w-14 h-14 rounded-full object-cover border-2 border-green-500 p-0.5">
                <span class="text-[10px] font-bold">VEG</span>
            </div>
            <div onclick="filter('nonveg')" class="flex flex-col items-center gap-1 min-w-[70px]">
                <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=200" class="w-14 h-14 rounded-full object-cover border-2 border-red-500 p-0.5">
                <span class="text-[10px] font-bold">NON-VEG</span>
            </div>
            <div onclick="filter('bread')" class="flex flex-col items-center gap-1 min-w-[70px]">
                <img src="https://images.unsplash.com/photo-1533777857889-4be7c70b33f7?w=200" class="w-14 h-14 rounded-full object-cover border-2 border-amber-500 p-0.5">
                <span class="text-[10px] font-bold">ROTI</span>
            </div>
        </div>

        <main class="p-4 max-w-xl mx-auto space-y-8 pb-32">
            <section id="menu-section">
                <h2 id="section-title" class="text-lg font-black italic mb-4 text-zinc-800">RECOMMENDED FOR YOU</h2>
                <div id="items-grid" class="grid gap-6"></div>
            </section>
        </main>
    </div>

    <div id="cart-ui" class="fixed inset-0 bg-white z-[100] hidden flex flex-col p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black tracking-tighter uppercase">Your Order</h2>
            <button onclick="toggleCart()" class="text-zinc-400 font-bold text-xs">CLOSE</button>
        </div>
        <div id="cart-list" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="mt-auto pt-6 border-t">
            <div class="bg-zinc-100 p-4 rounded-xl mb-4">
                <input type="text" id="room" placeholder="Hostel Room Number" class="w-full bg-transparent font-bold text-lg outline-none uppercase">
            </div>
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold">Total Bill</span>
                <span id="total" class="text-2xl font-black text-red-600 tracking-tighter">₹0</span>
            </div>
            <button onclick="send()" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg shadow-red-200 uppercase tracking-tighter">Place Order</button>
        </div>
    </div>

    <script>
        const db = {
            veg: [
                { name: "Matar Paneer", price: 190, img: "https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=500", type: "veg" },
                { name: "Paneer Tikka Masala", price: 230, img: "https://images.unsplash.com/photo-1596797038583-1c198f4ef7c8?w=500", type: "veg" },
                { name: "Dal Makhani", price: 200, img: "https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=500", type: "veg" }
            ],
            nonveg: [
                { name: "Butter Chicken", price: 180, img: "https://images.unsplash.com/photo-1603894584114-10651e704104?w=500", type: "nonveg", multi: true },
                { name: "Chicken Changezi", price: 180, img: "https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a?w=500", type: "nonveg", multi: true },
                { name: "Chicken Biryani", price: 220, img: "https://images.unsplash.com/photo-1563379091339-03b21bc4a4f8?w=500", type: "nonveg" }
            ],
            bread: [
                { name: "Butter Naan", price: 35, img: "https://images.unsplash.com/photo-1533777857889-4be7c70b33f7?w=500", type: "veg" },
                { name: "Lachha Paratha", price: 35, img: "https://images.unsplash.com/photo-1626132647523-66f5bf380ee2?w=500", type: "veg" }
            ]
        };

        let cart = [];

        function launch() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                filter('veg');
            }, 500);
        }

        function filter(type) {
            const list = db[type];
            document.getElementById('section-title').innerText = type.toUpperCase() + " SELECTION";
            document.getElementById('items-grid').innerHTML = list.map((i, idx) => `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-zinc-100">
                    <img src="${i.img}" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="${i.type == 'veg' ? 'veg-dot' : 'nonveg-dot'} mb-2"></div>
                                <h3 class="font-black text-lg tracking-tight uppercase">${i.name}</h3>
                            </div>
                            <span class="text-red-600 font-black italic">₹${i.price}</span>
                        </div>
                        <p class="text-[10px] text-zinc-400 font-bold mb-4 uppercase">Direct from TBC Kitchen • 20 Mins</p>
                        ${i.multi ? `
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="add('${i.name} (Qtr)', 180)" class="bg-zinc-100 py-3 rounded-xl font-bold text-[10px]">QTR</button>
                                <button onclick="add('${i.name} (Half)', 300)" class="bg-zinc-100 py-3 rounded-xl font-bold text-[10px]">HALF</button>
                                <button onclick="add('${i.name} (Full)', 550)" class="bg-zinc-100 py-3 rounded-xl font-bold text-[10px]">FULL</button>
                            </div>
                        ` : `
                            <button onclick="add('${i.name}', ${i.price})" class="w-full bg-red-600 text-white py-3 rounded-2xl font-black uppercase text-xs">Add to Cart</button>
                        `}
                    </div>
                </div>`).join('');
        }

        function add(name, price) {
            cart.push({name, price});
            update();
        }

        function remove(idx) {
            cart.splice(idx, 1);
            update();
        }

        function update() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total').innerText = '₹' + cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-zinc-50 p-4 rounded-2xl border">
                    <div><p class="font-black text-xs uppercase">${i.name}</p><p class="text-red-600 font-bold text-sm">₹${i.price}</p></div>
                    <button onclick="remove(${idx})" class="text-zinc-300 font-bold text-[10px]">REMOVE</button>
                </div>`).join('');
        }

        function toggleCart() { document.getElementById('cart-ui').classList.toggle('hidden'); }

        function send() {
            const room = document.getElementById('room').value;
            if(!room) return alert("Room number required!");
            const total = cart.reduce((s, i) => s + i.price, 0);
            const text = encodeURIComponent(`*NEW ORDER FROM DATTA DASH*\nRoom: ${room}\nItems: ${cart.map(i => i.name).join(', ')}\nTotal: ₹${total}`);
            window.location.href = `https://wa.me/917088832255?text=${text}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINE-DASH | Premium Delivery</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/000000/FF0000?text=🙏">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nonveg-dot { border: 1px solid #bd302b; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .nonveg-dot::after { content: ''; background: #bd302b; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .veg-dot { border: 1px solid #0f8a45; padding: 2px; display: inline-block; width: 12px; height: 12px; position: relative; }
        .veg-dot::after { content: ''; background: #0f8a45; width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 2px; left: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-transition { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up { transform: translateY(0) !important; opacity: 1 !important; display: flex !important; }
        .slide-up-hidden { transform: translateY(50px); opacity: 0; display: none !important; }
        .slide-right { transform: translateX(0) !important; opacity: 1 !important; display: flex !important; }
        .slide-right-hidden { transform: translateX(100%); opacity: 0; display: none !important; }
        .payment-active { border-color: #dc2626 !important; background: rgba(220, 38, 38, 0.1) !important; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans antialiased overflow-x-hidden">

    <div id="launch-screen" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">

        <div id="city-badge" class="bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800 text-[9px] font-black uppercase tracking-widest text-zinc-400 mb-10 flex items-center gap-2">

        </div>

    </div>

    <div id="menu-app" class="hidden fixed inset-0 z-[500] bg-[#0f0f0f] page-transition slide-right-hidden flex-col overflow-hidden">
        <header class="bg-[#1a1a1a] p-5 border-b border-zinc-800 shadow-xl">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <button onclick="goHome()" class="p-2 bg-zinc-800 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                <h1 class="text-xl font-black text-red-600 italic tracking-tighter uppercase">TBC Menu</h1>
                <div class="flex gap-2">
                    <button onclick="toggleAI()" class="p-2.5 bg-zinc-800 rounded-full border border-zinc-700 text-red-500 shadow-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg></button>
                    <button onclick="toggleCart()" class="bg-red-600 p-2.5 rounded-full relative shadow-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-black px-1.5 rounded-full">0</span></button>
                </div>
            </div>
        </header>
        <nav class="bg-[#0f0f0f] border-b border-zinc-800 py-3 overflow-x-auto no-scrollbar">
            <div class="flex gap-8 px-6 whitespace-nowrap text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">
                <button onclick="showSection('veg')" class="cat-btn text-red-600">Pure Veg</button>
                <button onclick="showSection('nonveg')" class="cat-btn">Non-Veg Main</button>
                <button onclick="showSection('tandoor')" class="cat-btn">Tandoor/Fish</button>
                <button onclick="showSection('fastfood')" class="cat-btn">Fast Food/Appetizers</button>
                <button onclick="showSection('beverages')" class="cat-btn">Beverages/Shakes</button>
            </div>
        </nav>
        <main class="flex-grow overflow-y-auto p-6 max-w-xl mx-auto pb-44 w-full"><div id="items-container" class="space-y-8"></div></main>
